<!DOCTYPE html>
<html>
<head>
    <title>Upload Document</title>
</head>
<body>

    <h2>Upload Document</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="document" accept=".pdf,.docx,.txt" required>
        <button type="submit">Upload</button>
    </form>

</body>
</html>
